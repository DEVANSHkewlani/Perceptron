<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopCore — Shopping Cart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">ShopCore</a>
      <nav class="header-nav">
        <a href="orders.html" class="nav-link">Orders</a>
        <a href="auth.html" id="auth-link" class="nav-link">Login</a>
        <a href="cart.html" class="btn btn-primary">
          Cart <span id="cart-count" class="badge">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero" style="padding: 40px 0 20px; text-align: left;">
      <h1>Your Shopping Cart</h1>
      <p>Review items and adjust quantities before placing your order.</p>
    </section>

    <div id="error-banner" class="error-banner hidden"></div>

    <div class="cart-layout">
      <!-- Cart items -->
      <div class="cart-list" id="cart-list">
        <div style="padding: 40px; text-align: center; color: var(--text-dark);">
          Loading your cart items...
        </div>
      </div>

      <!-- Order Summary -->
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="cart-subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span style="color: var(--success); font-weight: 600;">FREE</span>
        </div>
        <div class="summary-total">
          <span>Total</span>
          <span id="cart-total">$0.00</span>
        </div>
        <button class="btn btn-primary btn-block" id="checkout-btn" style="margin-top: 24px;" disabled>
          Place Order
        </button>
      </div>
    </div>
  </main>

  <script type="module">
    import { updateHeaderUI } from './api.js';
    import { renderCart } from './store.js';

    document.addEventListener("DOMContentLoaded", async () => {
      await updateHeaderUI();
      await renderCart();
    });
  </script>
</body>
</html>
