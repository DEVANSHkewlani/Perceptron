<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopCore — Products</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">ShopCore</a>
      <nav class="header-nav">
        <a href="orders.html" class="nav-link">Orders</a>
        <a href="auth.html" id="auth-link" class="nav-link">Login</a>
        <a href="cart.html" class="btn btn-primary">
          Cart <span id="cart-count" class="badge">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Find what you need</h1>
      <p>Quality electronics and peripherals, shipped fast.</p>
    </section>

    <!-- Filters -->
    <div class="filters">
      <input id="search" type="search" placeholder="Search products..." class="input" />
      <div class="category-tabs">
        <button class="tab active" data-cat="">All</button>
        <button class="tab" data-cat="electronics">Electronics</button>
        <button class="tab" data-cat="peripherals">Peripherals</button>
        <button class="tab" data-cat="storage">Storage</button>
        <button class="tab" data-cat="accessories">Accessories</button>
      </div>
    </div>

    <!-- Product grid — populated by JS -->
    <div id="product-grid" class="product-grid">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>

    <div id="error-banner" class="error-banner hidden"></div>
  </main>

  <script type="module">
    import { updateHeaderUI } from './api.js';
    import { renderProducts, initFilters } from './store.js';
    
    // Initialize UI on load
    document.addEventListener("DOMContentLoaded", async () => {
      await updateHeaderUI();
      initFilters();
      renderProducts();
    });
  </script>
</body>
</html>
