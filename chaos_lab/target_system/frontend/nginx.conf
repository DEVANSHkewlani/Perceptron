server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    
    # SPA-style fallback for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Disable caching for dev
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
}
