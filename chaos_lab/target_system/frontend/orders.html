<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopCore — Order History</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">ShopCore</a>
      <nav class="header-nav">
        <a href="orders.html" class="nav-link">Orders</a>
        <a href="auth.html" id="auth-link" class="nav-link">Login</a>
        <a href="cart.html" class="btn btn-primary">
          Cart <span id="cart-count" class="badge">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero" style="padding: 40px 0 20px; text-align: left;">
      <h1>Your Order History</h1>
      <p>Track fulfillment status and view receipts for previous purchases.</p>
    </section>

    <div id="error-banner" class="error-banner hidden"></div>

    <div class="orders-layout">
      <div class="orders-list" id="orders-list">
        <div style="padding: 40px; text-align: center; color: var(--text-dark);">
          Loading your order history...
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { updateHeaderUI } from './api.js';
    import { renderOrders } from './store.js';

    document.addEventListener("DOMContentLoaded", async () => {
      await updateHeaderUI();
      await renderOrders();
    });
  </script>
</body>
</html>
