global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job', 'instance']
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'perception-api'

receivers:
- name: 'perception-api'
  webhook_configs:
  - url: 'http://host.docker.internal:8080/perception/prometheus-alerts'
    send_resolved: true
