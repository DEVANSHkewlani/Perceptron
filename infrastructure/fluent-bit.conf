[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name             tail
    Path             /var/log/cognitive/*.log
    Tag              app.logs
    Refresh_Interval 5
    Mem_Buf_Limit    5MB
    Skip_Long_Lines  On

[FILTER]
    Name  record_modifier
    Match *
    Record host_node node-01

[OUTPUT]
    Name            kafka
    Match           *
    Brokers         redpanda:29092
    Topics          raw.logs
    Property        client.id fluent-bit
    Property        compression.codec lz4
    Format          json
